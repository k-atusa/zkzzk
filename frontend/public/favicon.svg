<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0B0D" />
      <stop offset="100%" stop-color="#14161B" />
    </linearGradient>
    <!-- Chzzk Neon Green to Blue Gradient -->
    <linearGradient id="chzzkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFA3" />
      <stop offset="50%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#7B2CBF" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" />
  <rect width="496" height="496" x="8" y="8" rx="132" fill="none" stroke="url(#chzzkGrad)" stroke-width="4" opacity="0.3" />

  <!-- Center 'Z' Icon (Symmetric, Centered & Flat) -->
  <g>
    <path d="M 148 148 
             L 364 148 
             L 148 364 
             L 364 364" 
          fill="none" 
          stroke="url(#chzzkGrad)" 
          stroke-width="52" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>